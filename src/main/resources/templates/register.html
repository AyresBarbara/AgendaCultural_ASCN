<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Agenda Cultural</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>🎭 Agenda Cultural</h1>
            <h2>Crie sua conta gratuitamente</h2>
            
            <form id="form-cadastro">
                <div class="form-group">
                    <label>👤 Nome completo</label>
                    <input type="text" id="name" placeholder="Digite seu nome" required>
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Senha</label>
                    <input type="password" id="password" placeholder="********" required>
                    <small>Mínimo 10 caracteres, 1 maiúscula, 1 número e 1 caractere especial</small>
                </div>
                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>
            
            <div class="link">
                <p>Já tem conta? <a href="/login">Faça login</a></p>
            </div>
        </div>
    </div>
    
    <div id="message" class="message"></div>
    
    <script>
        document.getElementById("form-cadastro").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            const btn = e.submitter;
            const originalText = btn.textContent;
            btn.textContent = "Cadastrando...";
            btn.disabled = true;
            
            try {
                const response = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage("✅ Cadastro realizado! Faça login.", "success");
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 2000);
                } else {
                    showMessage("❌ " + (data.message || data.erro || "Erro no cadastro"), "error");
                }
            } catch (error) {
                showMessage("❌ Erro de conexão", "error");
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById("message");
            msgDiv.textContent = msg;
            msgDiv.className = "message message-" + type;
            msgDiv.style.display = "block";
            setTimeout(() => {
                msgDiv.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
