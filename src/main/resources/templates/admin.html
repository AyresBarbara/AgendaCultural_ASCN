<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Agenda Cultural</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div th:replace="~{fragments/header :: header}"></div>
        
        <div class="admin-section">
            <h3>💾 Backup Manual</h3>
            <button class="btn-admin btn-admin-success" onclick="fazerBackup()">Gerar Backup Agora</button>
        </div>

        <div class="admin-section">
            <h3>📋 Listar Backups</h3>
            <button class="btn-admin" onclick="listarBackups()">Listar Backups</button>
            <select id="selectBackup"></select>
            <button class="btn-admin btn-admin-warning" onclick="restaurarBackup()">Restaurar Selecionado</button>
        </div>

        <div class="admin-section">
            <h3>📤 Restaurar via Upload</h3>
            <input type="file" id="fileUpload" accept=".sql">
            <button class="btn-admin" onclick="restaurarUpload()">Enviar e Restaurar</button>
        </div>

        <div class="admin-section">
            <h3>👥 Usuários Cadastrados</h3>
            <button class="btn-admin" onclick="listarUsuarios()">Carregar Usuários</button>
            <div id="listaUsuarios"></div>
        </div>

        <div id="resultado-backup" class="result"></div>
    </div>
    
    <div id="message" class="message"></div>
    
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
