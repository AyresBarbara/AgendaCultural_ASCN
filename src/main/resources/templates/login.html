<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Agenda Cultural</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>🎭 Agenda Cultural</h1>
            <h2>Faça login para continuar</h2>
            
            <form id="form-login">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Senha</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            
            <div class="link">
                <p>Não tem conta? <a href="/register">Cadastre-se gratuitamente</a></p>
            </div>
        </div>
    </div>
    
    <div id="message" class="message"></div>
    
    <script>
        document.getElementById("form-login").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            const btn = e.submitter;
            const originalText = btn.textContent;
            btn.textContent = "Entrando...";
            btn.disabled = true;
            
            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, senha: password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem("token", data.token);
                    console.log("TOKEN SALVO NO LOGIN:", data.token);
                    showMessage("✅ Login realizado! Redirecionando...", "success");
                    setTimeout(() => {
                        window.location.href = "/index";
                    }, 500);
                } else {
                    showMessage("❌ " + (data.message || data.erro || "Email ou senha inválidos"), "error");
                }
            } catch (error) {
                showMessage("❌ Erro de conexão", "error");
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById("message");
            msgDiv.textContent = msg;
            msgDiv.className = "message message-" + type;
            msgDiv.style.display = "block";
            setTimeout(() => {
                msgDiv.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
