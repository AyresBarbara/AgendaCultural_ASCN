# Database Properties
spring.application.name=agendacultural
spring.datasource.url=jdbc:mysql://localhost:3306/agenda_cultural
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
jwt.secret=minha-chave-secreta-muito-segura-com-pelo-menos-32-bytes-123456
jwt.expiration=86400000

# Caminho do mysqldump (só no Windows, no Linux usa o padrão)
mysqldump.path=C:\\Program Files\\MySQL\\MySQL Server 9.7\\bin\\mysqldump.exe

# HTTPS Configuration
server.port=8443
server.ssl.key-store-type=PKCS12
server.ssl.key-store=keystore.p12
server.ssl.key-store-password=123456
server.ssl.key-alias=tomcat